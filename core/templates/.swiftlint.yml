excluded:
  - Pods
  - .build
  - DerivedData
  - .swiftpm
  - "*/Preview Content"
  - "**/*.generated.swift"

disabled_rules:
  - trailing_whitespace
  - todo
  - multiple_closures_with_trailing_closure # SwiftUI'da yaygın pattern

opt_in_rules:
  # Force kullanımları
  - force_unwrapping
  - force_cast
  - implicitly_unwrapped_optional

  # Boş kontroller
  - empty_count
  - empty_string
  - empty_collection_literal

  # Closure / syntax
  - closure_spacing
  - closure_body_length
  - trailing_closure

  # Collection
  - contains_over_filter_count
  - contains_over_first_not_nil
  - first_where
  - last_where
  - sorted_first_last
  - flatmap_over_map_reduce

  # Bool / optional
  - discouraged_optional_boolean
  - redundant_nil_coalescing

  # Import / organization
  - sorted_imports
  - duplicate_imports

  # Whitespace
  - vertical_whitespace_opening_braces
  - vertical_whitespace_closing_braces

  # Modern Swift
  - prefer_self_in_static_references
  - prefer_zero_over_explicit_init
  - toggle_bool
  - joined_default_parameter

  # Safety
  - unowned_variable_capture
  - discouraged_direct_init
  - private_over_fileprivate

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 50
  error: 100

closure_body_length:
  warning: 30
  error: 50

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y
    - i
    - to
    - on
    - no
    - ok
    - vm

nesting:
  type_level: 2
  function_level: 3

custom_rules:
  no_print:
    name: "No print()"
    regex: "\\bprint\\s*\\("
    message: "Use os.Logger instead of print()"
    severity: warning
